<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SUCCESS POINT EXAM BY ARIJIT </title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
font-family:Arial;
margin:0;
background:linear-gradient(to right,#f8fafc,#e0f2fe);
}
.header{
background:linear-gradient(135deg,#0f172a,#2563eb,#06b6d4);
color:white;
padding:22px;
text-align:center;
font-size:30px;
font-weight:900;
letter-spacing:2px;
text-transform:uppercase;
font-family:'Trebuchet MS',sans-serif;
box-shadow:0 4px 20px rgba(0,0,0,0.25);
border-bottom:4px solid #38bdf8;
text-shadow:2px 2px 8px rgba(0,0,0,0.4);
}
.card{
  background: white;
  border-radius: 16px;
  padding: 22px;
  margin-top: 20px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);
  transition: 0.3s;
}

.card, .question, #options{
  position:relative;
  z-index:2;
}
.container{
  max-width:900px;
  margin:auto;
  padding:20px;

  /* 🔥 FIX OVERLAP */
  position:relative;
  z-index:1;
}
body{
  font-family:Arial;
  margin:0;
  background:linear-gradient(to right,#f8fafc,#e0f2fe);

  /* 🔥 FIX */
  overflow-x:hidden;
}

.palette div{
  transform: translateZ(0);
}
.palette div{
  width:40px;
  height:40px;

  display:flex;
  align-items:center;
  justify-content:center;

  border-radius:8px;
  cursor:pointer;

  background:#f87171;
  color:white;
  font-weight:bold;
  font-size:14px;

  user-select:none;
  transition:0.15s;
}

.palette{
  position: fixed;
  right: 20px;
  top: 120px;

  width: 240px;
  max-height: 70vh;

  display: grid;
  grid-template-columns: repeat(5, 40px);
  gap: 8px;

  overflow-y: auto;

  z-index: 9999;

  /* 🔥 MAIN STABILITY FIX */
  transform: translate3d(0,0,0);
  backface-visibility: hidden;
  will-change: transform;

  background: rgba(255,255,255,0.95);
  border-radius: 12px;
  padding: 8px;

  box-shadow: 0 8px 25px rgba(0,0,0,0.15);

  /* 🔥 STOP OVERLAP DRAG FEEL */
  pointer-events: auto;
}
.palette div:hover{
  transform:scale(1.05);
}
.question,
#options,
.card{
  position: relative;
  z-index: 2;
}
.attempted{background:#22c55e !important;}
.timer{position:absolute;right:20px;top:15px;font-weight:bold;color:red;}
button{padding:10px 20px;border:none;background:#0f172a;color:white;border-radius:6px;cursor:pointer;margin-top:10px;}
.submit-btn{
position:fixed;
bottom:20px;
right:20px;
padding:18px 35px;
font-size:22px;
font-weight:bold;
border-radius:14px;
display:none;
background:#dc2626;
z-index:999;
}
.option{
  padding:12px;
  margin:10px 0;
  border:1px solid #cbd5e1;
  border-radius:10px;
  cursor:pointer;
  background:white;
  transition:0.2s;
  font-size:16px;
}

.option:hover{
  background:#e0f2fe;
  transform:scale(1.01);
}

.selected{
  background:#38bdf8 !important;
  color:white !important;
  border:2px solid #0ea5e9;
}
.review-card{margin:10px 0;padding:10px;border:1px solid #ddd;border-radius:6px;}
.correct{color:green;}
.wrong{color:red;}
.admin-btn{position:fixed;top:10px;right:10px;}
input,select{padding:10px;width:100%;margin:5px 0;}
.watermark{
position:fixed;
bottom:15px;
right:20px;
opacity:0.15;
font-size:42px;
font-weight:bold;
}
#sectionTabs{
display:flex;
gap:10px;
margin:20px 0;
flex-wrap:wrap;
}

#sectionTabs button{
background:#2563eb;
padding:10px 18px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="header">SUCCESS POINT EXAM BY ARIJIT </div>
<button class="admin-btn" onclick="openAdmin()">Admin</button>

<div class="container">

<div id="nameScreen" class="card">
<h3>Enter Your Name & Phone</h3>
<input id="username" placeholder="Name">
<input id="phone" placeholder="Phone (+91...)">
<button onclick="startQuiz()">Start Test</button>
</div>

<div id="quizScreen" class="card" style="display:none">
<div class="timer">Time Left: <span id="time">60:00</span></div>
<div id="sectionTabs">
<button onclick="filterSection('Math')">Math</button>
<button onclick="filterSection('Reasoning')">Reasoning</button>
<button onclick="filterSection('GK')">GK</button>
<button onclick="filterSection('GS')">GS</button>
</div>
<div class="qno" id="qno"></div>
<div class="section" id="section"></div>
<div class="question" id="question"></div>
<div id="options"></div>
<button onclick="prevQ()">Previous</button>
<button onclick="saveAndNext()">Save & Next</button>
<button onclick="clearResponse()">Clear Response</button>

<div>Attempted: <span id="attemptCount">0</span>/50</div>
<div class="palette" id="palette"></div>
</div>

<div id="resultScreen" class="card" style="display:none"></div>

</div>

<button class="submit-btn" id="submitBtn" onclick="submitQuiz()">SUBMIT TEST</button>

<div class="watermark">MISSION ARMY BY ARIJIT</div>

<script>
// FIREBASE INIT
const firebaseConfig = {
  apiKey: "AIzaSyCZyqnEQyVXog5VAcgHmrV2-BgbQWRWJv8",
  authDomain: "armygdapp.firebaseapp.com",
  projectId: "armygdapp"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let questions = [];
let allQuestions = [];
let current = 0;
let answers = [];
let seconds = 2700, timer;
let activeSection = "All";
let loginDocId = "";
let sectionAnswers = {
Math: [],
Reasoning: [],
GK: [],
GS: []
};


const username = document.getElementById("username");
const phone = document.getElementById("phone");
const nameScreen = document.getElementById("nameScreen");
const quizScreen = document.getElementById("quizScreen");
const resultScreen = document.getElementById("resultScreen");
const qno = document.getElementById("qno");
const section = document.getElementById("section");
const question = document.getElementById("question");
const options = document.getElementById("options");
const palette = document.getElementById("palette");
const attemptCount = document.getElementById("attemptCount");
const time = document.getElementById("time");
const submitBtn = document.getElementById("submitBtn");

// LOAD QUESTIONS
function loadQuestions(){
  db.collection("questions").onSnapshot(snapshot=>{
    allQuestions = [];

    snapshot.forEach(doc=>{
      allQuestions.push({
        ...doc.data(),
        id:doc.id
      });
    });

    console.log("Questions Updated Live");
  });
}
function filterSection(sec){
  activeSection = sec;

  questions = allQuestions.filter(q => q.section === sec);

  if(!questions.length){
    alert("No questions in this section");
    return;
  }

  current = 0;

  if(!sectionAnswers[sec]){
    sectionAnswers[sec] = Array(questions.length).fill(null);
  }

  answers = [...sectionAnswers[sec]];

  buildPalette();
  loadQ();
}

function startQuiz(){
if(!username.value || !phone.value) return alert("Enter both Name and Phone");

db.collection("allowedUsers")
.where("name","==",username.value)
.where("phone","==",phone.value)
.get()
.then(snapshot=>{
if(snapshot.empty) return alert("You are not allowed 😢");

nameScreen.style.display="none";

db.collection("logins").add({
  name: username.value,
  phone: phone.value,
  time: firebase.firestore.FieldValue.serverTimestamp(),
  score: 0
}).then(doc=>{
  loginDocId = doc.id;
});
quizScreen.style.display="block";
submitBtn.style.display="block";
activeSection = "";
questions = [];
answers = [];

let sections = ["Math","Reasoning","GK","GS"];
sections.sort(() => Math.random() - 0.5);

document.getElementById("sectionTabs").innerHTML = "";

sections.forEach(sec=>{
document.getElementById("sectionTabs").innerHTML +=
`<button onclick="filterSection('${sec}')">${sec}</button>`;
});

document.getElementById("sectionTabs").style.display="flex";
question.innerText = "Select Section To Start";
options.innerHTML = "";
qno.innerText = "";
section.innerText = "";
palette.innerHTML = "";
question.innerText = "Select Section To Start";
options.innerHTML = "";
qno.innerText = "";
section.innerText = "";
palette.innerHTML = "";

timer=setInterval(updateTimer,1000);
window.onbeforeunload = function () {
  return "Exam is running. If you leave, your progress may be lost.";
};
});
}

     

// LOAD QUESTION
function loadQ(){
  const q = questions[current];

  qno.innerText = `Question ${current+1} / ${questions.length}`;
  section.innerText = "Section: " + q.section;
  question.innerText = q.q;
  options.innerHTML = "";

  q.options.forEach((opt,i)=>{
    const div = document.createElement("div");
    div.className = "option";
    div.innerText = opt;

if(
  sectionAnswers[activeSection] &&
  sectionAnswers[activeSection][current] !== undefined &&
  sectionAnswers[activeSection][current] === i
){
  div.classList.add("selected");
}
      

    div.onclick = () => {
      answers[current] = i;
      sectionAnswers[activeSection][current] = i;

      updatePalette();

      document.querySelectorAll(".option").forEach(o=>{
        o.classList.remove("selected");
      });

      div.classList.add("selected");
    };

    options.appendChild(div);
  });

  attemptCount.innerText = answers.filter(a=>a!=null).length;
}
function saveAnswer(){
  sectionAnswers[activeSection][current] = answers[current];
}  
function clearResponse(){

if(!sectionAnswers[activeSection]){
  sectionAnswers[activeSection] = [];
}

answers[current] = null;

const originalIndex = allQuestions.findIndex(x=>x.id===questions[current].id);
sectionAnswers[activeSection][originalIndex] = null;

updatePalette();
loadQ();
}

function saveAndNext(){

  const selected = answers[current];

  if(!sectionAnswers[activeSection]){
    sectionAnswers[activeSection] = {};
  }

  sectionAnswers[activeSection][current] = selected ?? null;

  if(current < questions.length - 1){
    current++;
    loadQ();
  }

  updatePalette();
}

function prevQ(){
  if(current > 0){
    current--;
    loadQ();
  }
}

function buildPalette(){
  palette.innerHTML = "";

  const data = sectionAnswers[activeSection] || [];

  for(let i=0;i<questions.length;i++){
    const box = document.createElement("div");
    box.innerText = i+1;

    if(data[i] != null){
      box.classList.add("attempted");
    }

    box.onclick = () => {
      current = i;
      loadQ();
    };

    palette.appendChild(box);
  }
}
function updatePalette(){
  const boxes = palette.children;

  const data = sectionAnswers[activeSection] || [];

  for(let i=0;i<boxes.length;i++){
    if(data[i] != null && data[i] !== undefined){
      boxes[i].classList.add("attempted");
    } else {
      boxes[i].classList.remove("attempted");
    }
  }
}

function submitQuiz(){
window.onbeforeunload = null;
clearInterval(timer);
submitBtn.style.display="none";

let scores = {
Math:0,
Reasoning:0,
GK:0,
GS:0
};

for(let sec in sectionAnswers){
let qs = allQuestions.filter(q=>q.section===sec);

for(let i=0;i<qs.length;i++){
if(sectionAnswers[sec][i] === qs[i].answer){
scores[sec] += 2;
}
}
}

let total = scores.Math + scores.Reasoning + scores.GK + scores.GS;

if(loginDocId){
db.collection("logins").doc(loginDocId).update({
score: total
}).then(()=>{

quizScreen.style.display="none";
resultScreen.style.display="block";

resultScreen.innerHTML=`
<h2>${username.value}</h2>
<h3>Total Score: ${total}</h3>
<h3 id="rankShow">Calculating Rank...</h3>

<h4>Math: ${scores.Math}</h4>
<h4>Reasoning: ${scores.Reasoning}</h4>
<h4>GK: ${scores.GK}</h4>
<h4>GS: ${scores.GS}</h4>

<button onclick="showReview()">Review Answers 🔥</button>
<button onclick="downloadPDF()">Download Review PDF</button>
<button onclick="location.reload()">Restart</button>

<div id="reviewBox"></div>

<h3>🏆 Leaderboard</h3>
<div id="studentLeaderboard">Loading...</div>
`;

loadStudentLeaderboard(total);
});
}
}

function updateTimer(){
const m=Math.floor(seconds/60);
const s=seconds%60;

time.innerText=`${m}:${s<10?'0':''}${s}`;

// Last 5 minutes = Red
if(seconds <= 300){
time.style.color="red";
time.style.fontWeight="bold";
time.style.fontSize="24px";
}else{
time.style.color="green";
}

if(seconds<=0){
submitQuiz();
}

seconds--;
}

function showReview(){
let html="";

for(let sec in sectionAnswers){
let qs = allQuestions.filter(q=>q.section===sec);
let ans = sectionAnswers[sec];

html += `<h3>${sec}</h3>`;

for(let i=0;i<qs.length;i++){
html+=`
<div class='review-card'>
<b>Q${i+1}: ${qs[i].q}</b><br>
<span class='${ans[i]===qs[i].answer ? 'correct':'wrong'}'>
Your Answer: ${ans[i]!=null ? qs[i].options[ans[i]] : 'Not Attempted'}
</span><br>
<span class='correct'>Correct: ${qs[i].options[qs[i].answer]}</span>
</div>
`;
}
}

document.getElementById("reviewBox").innerHTML = html;
}

function downloadPDF(){
  showReview();

  const printContent = `
    <html>
    <head>
      <title>Review PDF</title>
      <style>
        body{font-family:Arial;padding:20px;}
        .correct{color:green;}
        .wrong{color:red;}
        .review-card{
          border:1px solid #ddd;
          padding:10px;
          margin:10px 0;
          border-radius:8px;
        }
      </style>
    </head>
    <body>
      <h2>${username.value} - Exam Review</h2>
      ${document.getElementById("reviewBox").innerHTML}
    </body>
    </html>
  `;

  const win = window.open("", "", "width=900,height=700");
  win.document.write(printContent);
  win.document.close();
  win.print();
}
// ADMIN PANEL
function openAdmin(){
  const pass = prompt("Enter Admin Password");
  if(pass!=="arijit@9064") return alert("Wrong Password");

  nameScreen.style.display="none";
  quizScreen.style.display="none";
  resultScreen.style.display="block";

  resultScreen.innerHTML=`
  
    <h2>Admin Panel 😎🔥</h2>

    <h3>Add / Update Question</h3>
    <input id='qId' type='hidden'>
    <input id='newQ' placeholder='Question'>
    <input id='opt1' placeholder='Option 1'>
    <input id='opt2' placeholder='Option 2'>
    <input id='opt3' placeholder='Option 3'>
    <input id='opt4' placeholder='Option 4'>
    <select id='sectionSel'><option>Math</option><option>GK</option><option>GS</option><option>Reasoning</option></select>
    <select id='answerSel'><option value='0'>Option 1</option><option value='1'>Option 2</option><option value='2'>Option 3</option><option value='3'>Option 4</option></select>
    <button onclick='saveQuestion()'>Save Question</button>

    <h3>All Questions 😎</h3>
    <div id='adminQuestions'>Loading...</div>

    <h3>Allowed Users 😎</h3>
    <input id='allowName' placeholder='Name'>
    <input id='allowPhone' placeholder='Phone (+91...)'>
    <button onclick="addAllowedUser()">Add User</button>
    <div id='allowedList'>Loading...</div>

    <h3>Student Logins 😎</h3>
    <button onclick="resetLogins()">Reset Logins 💀</button>
    <div id='loginList'>Loading...</div>
<h3>Leaderboard 🏆</h3>
<button onclick="resetLeaderboard()">Reset Leaderboard</button>
<div id='leaderboard'>Loading...</div>
  `;

  loadAdminQuestions();
  loadAllowedUsers();
  loadLogins();
  loadLeaderboard();
}

// ADMIN FUNCTIONS
function saveQuestion(){
  const qId = document.getElementById('qId').value;
  const qText = document.getElementById('newQ').value.trim();
  const opts = [document.getElementById('opt1').value.trim(), document.getElementById('opt2').value.trim(), document.getElementById('opt3').value.trim(), document.getElementById('opt4').value.trim()];
  const section = document.getElementById('sectionSel').value;
  const answer = Number(document.getElementById('answerSel').value);
  if(!qText || opts.some(o=>!o)) return alert("Enter Question & All Options");
  const qData = {q: qText, options: opts, section, answer};
  if(qId){ db.collection('questions').doc(qId).update(qData).then(()=>{alert("Question Updated 😎🔥");clearQuestionForm();loadAdminQuestions();loadQuestions();});}
  else{ db.collection('questions').add(qData).then(()=>{alert("Question Added 😎🔥");clearQuestionForm();loadAdminQuestions();loadQuestions();});}
}

function loadAdminQuestions(){
  db.collection("questions").get().then(snapshot=>{
    let html="";
    snapshot.forEach(doc=>{
      const q=doc.data();
      html+=`<div class='review-card'><b>${q.section}</b> - ${q.q}<br>
        <button onclick="editQuestion('${doc.id}')">Edit</button>
        <button onclick="deleteQuestion('${doc.id}')">Delete</button>
      </div>`;
    });
    document.getElementById("adminQuestions").innerHTML=html;
  });
}

function editQuestion(id){
  db.collection('questions').doc(id).get().then(doc=>{
    const q = doc.data();
    document.getElementById('qId').value = id;
    document.getElementById('newQ').value = q.q;
    document.getElementById('opt1').value = q.options[0];
    document.getElementById('opt2').value = q.options[1];
    document.getElementById('opt3').value = q.options[2];
    document.getElementById('opt4').value = q.options[3];
    document.getElementById('sectionSel').value = q.section;
    document.getElementById('answerSel').value = q.answer;
  });
}

function deleteQuestion(id){if(!confirm("Delete Question?")) return; db.collection("questions").doc(id).delete().then(()=>{alert("Deleted 😎");loadAdminQuestions();loadQuestions();});}

function clearQuestionForm(){document.getElementById('qId').value='';document.getElementById('newQ').value='';document.getElementById('opt1').value='';document.getElementById('opt2').value='';document.getElementById('opt3').value='';document.getElementById('opt4').value='';document.getElementById('sectionSel').value='Math';document.getElementById('answerSel').value='0';}

// ALLOWED USERS
function addAllowedUser(){
  const name = document.getElementById("allowName").value.trim();
  const phone = document.getElementById("allowPhone").value.trim();
  if(!name||!phone) return alert("Enter Name & Phone");
  db.collection("allowedUsers").add({name,phone}).then(()=>{alert("User Added");loadAllowedUsers();});
}
function loadAllowedUsers(){
  db.collection("allowedUsers").get().then(snapshot=>{
    let html="";
    snapshot.forEach(doc=>{
      const u=doc.data();
      html+=`
      <div class='review-card'>
        ${u.name} | ${u.phone}
        <br>
        <button onclick="deleteAllowedUser('${doc.id}')">Delete</button>
      </div>`;
    });
    document.getElementById("allowedList").innerHTML=html;
  });
}

function deleteAllowedUser(id){
  if(!confirm("Delete this user?")) return;

  db.collection("allowedUsers").doc(id).delete().then(()=>{
    alert("User Deleted");
    loadAllowedUsers();
  });
}

// LOGINS
function resetLogins(){
  if(!confirm("Reset ALL Login History? 😈")) return;
  db.collection("logins").get().then(snapshot=>{snapshot.forEach(doc=>doc.ref.delete());loadLogins();});
}

function loadLogins(){
  db.collection("logins").orderBy("time","desc").get().then(snapshot=>{
    let html="";
    snapshot.forEach(doc=>{
      const log = doc.data();
      const date = log.time.toDate().toLocaleString();

      html += `
      <div class='review-card'>
        👤 ${log.name} | ${log.phone}<br>
        🎯 Score: ${log.score || 0}<br>
        ⏱ ${date}
      </div>`;
    });

    document.getElementById("loginList").innerHTML = html || "No Logins Yet 😢";
  });
}

function loadStudentLeaderboard(total){
db.collection("logins")
.orderBy("score","desc")
.limit(10)
.get()
.then(snapshot=>{
let html="";
let rank=1;
let userRank=1;

snapshot.forEach(doc=>{
const log=doc.data();

if(log.score > total){
userRank++;
}

html+=`
<div class='review-card'>
🏆 Rank ${rank}<br>
👤 ${log.name}<br>
🎯 Score: ${log.score}
</div>
`;

rank++;
});

document.getElementById("studentLeaderboard").innerHTML=html;
document.getElementById("rankShow").innerHTML="🏆 Your Rank: "+userRank;
});
}

function resetLeaderboard(){
if(!confirm("Reset Leaderboard?")) return;

db.collection("logins").get().then(snapshot=>{

let batch = db.batch();

snapshot.forEach(doc=>{
batch.update(doc.ref,{
score:0
});
});

batch.commit().then(()=>{
alert("Leaderboard Reset Done 🔥");
loadLeaderboard();
loadLogins();
});
});
}

function loadLeaderboard(){
  db.collection("logins")
    .orderBy("score","desc")
    .limit(10)
    .get()
    .then(snapshot=>{
      let html="";
      let rank=1;

      snapshot.forEach(doc=>{
        const log = doc.data();

        html += `
        <div class='review-card'>
          🏆 Rank ${rank}<br>
          👤 ${log.name}<br>
          🎯 Score: ${log.score}
        </div>
        `;

        rank++;
      });

      document.getElementById("leaderboard").innerHTML =
        html || "No Scores Yet";
    });
}
// INITIAL LOAD
loadQuestions();

</script>
</body>
</html>
