<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ARMY PRACTICE SET BY ARIJIT</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{font-family:Arial;margin:0;background:white;}
.header{background:#0f172a;color:white;padding:15px;text-align:center;font-size:22px;font-weight:bold;}
.container{max-width:900px;margin:auto;padding:20px;}
.card{border:1px solid #ddd;padding:20px;border-radius:10px;margin-top:20px;position:relative;}
.section{font-size:14px;font-weight:bold;margin-bottom:10px;}
.qno{font-size:13px;color:#475569;margin-bottom:5px;}
.question{font-size:18px;margin-bottom:15px;}
.option{padding:10px;border:1px solid #ccc;border-radius:6px;margin:8px 0;cursor:pointer;}
.selected{background:skyblue;}
.palette{display:grid;grid-template-columns:repeat(10,1fr);gap:6px;margin-top:20px;}
.palette div{padding:8px;text-align:center;border-radius:4px;cursor:pointer;background:pink;}
.attempted{background:skyblue !important;}
.timer{position:absolute;right:20px;top:15px;font-weight:bold;color:red;}
button{padding:10px 20px;border:none;background:#0f172a;color:white;border-radius:6px;cursor:pointer;margin-top:10px;}
.submit-btn{position:fixed;bottom:20px;right:20px;}
.review-card{margin:10px 0;padding:10px;border:1px solid #ddd;border-radius:6px;}
.correct{color:green;}
.wrong{color:red;}
.admin-btn{position:fixed;top:10px;right:10px;}
input,select{padding:10px;width:100%;margin:5px 0;}
.watermark{position:fixed;bottom:10px;right:15px;opacity:0.12;font-size:20px;font-weight:bold;}
</style>
</head>

<body>

<div class="header">ARMY PRACTICE SET BY ARIJIT</div>
<button class="admin-btn" onclick="openAdmin()">Admin</button>

<div class="container">

<!-- Name + Phone Input Screen -->
<div id="nameScreen" class="card">
<h3>Enter Your Name & Phone to Start</h3>
<input id="username" placeholder="Your Name">
<input id="userPhone" placeholder="Phone Number">
<button onclick="startQuiz()">Start Test</button>
</div>

<!-- Quiz Screen -->
<div id="quizScreen" class="card" style="display:none">
<div class="timer">Time Left: <span id="time">60:00</span></div>
<div class="qno" id="qno"></div>
<div class="section" id="section"></div>
<div class="question" id="question"></div>
<div id="options"></div>
<button onclick="prevQ()">Previous</button>
<button onclick="nextQ()">Next</button>
<div>Attempted: <span id="attemptCount">0</span>/50</div>
<div class="palette" id="palette"></div>
</div>

<!-- Result Screen -->
<div id="resultScreen" class="card" style="display:none"></div>

</div>

<button class="submit-btn" onclick="submitQuiz()">Submit</button>
<div class="watermark">MISSION ARMY BY ARIJIT</div>

<script>
// FIREBASE INIT
const firebaseConfig = {
  apiKey: "AIzaSyCZyqnEQyVXog5VAcgHmrV2-BgbQWRWJv8",
  authDomain: "armygdapp.firebaseapp.com",
  projectId: "armygdapp"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// VARIABLES
let questions = [];
let current = 0;
let answers = [];
let seconds = 3600, timer;

const username = document.getElementById("username");
const userPhone = document.getElementById("userPhone");
const nameScreen = document.getElementById("nameScreen");
const quizScreen = document.getElementById("quizScreen");
const resultScreen = document.getElementById("resultScreen");

const qno = document.getElementById("qno");
const section = document.getElementById("section");
const question = document.getElementById("question");
const options = document.getElementById("options");
const palette = document.getElementById("palette");
const attemptCount = document.getElementById("attemptCount");
const time = document.getElementById("time");

// LOAD QUESTIONS
loadQuestions();
function loadQuestions(){
  db.collection("questions").get().then(snapshot=>{
    questions=[];
    snapshot.forEach(doc=>{
      questions.push({...doc.data(), id:doc.id});
    });
    questions.sort(()=>Math.random()-0.5);
    questions = questions.slice(0,50);
    answers = Array(questions.length).fill(null);
  });
}

// ===================== START QUIZ =====================
function startQuiz(){
  if(!username.value || !userPhone.value) return alert("Enter both Name and Phone");

  db.collection("allowedUsers")
    .where("name","==",username.value)
    .where("phone","==",userPhone.value)
    .get()
    .then(snapshot=>{
      if(snapshot.empty) return alert("You are not allowed 😢");

      nameScreen.style.display="none";
      quizScreen.style.display="block";
      buildPalette();
      loadQ();
      timer=setInterval(updateTimer,1000);
    });
}

// ===================== LOAD QUESTION =====================
function loadQ(){
  const q=questions[current];
  qno.innerText=`Question ${current+1} / ${questions.length}`;
  section.innerText="Section: "+q.section;
  question.innerText=q.q;
  options.innerHTML="";
  q.options.forEach((opt,i)=>{
    const div=document.createElement("div");
    div.className="option";
    div.innerText=opt;
    if(answers[current]===i) div.classList.add("selected");
    div.onclick=()=>{
      answers[current]=i;
      updatePalette();
      loadQ();
    };
    options.appendChild(div);
  });
  attemptCount.innerText=answers.filter(a=>a!=null).length;
}

function nextQ(){ if(current<questions.length-1){current++;loadQ();} }
function prevQ(){ if(current>0){current--;loadQ();} }

function buildPalette(){
  palette.innerHTML="";
  answers.forEach((_,i)=>{
    const box=document.createElement("div");
    box.innerText=i+1;
    box.onclick=()=>{current=i;loadQ();};
    palette.appendChild(box);
  });
  updatePalette();
}

function updatePalette(){
  document.querySelectorAll(".palette div").forEach((box,i)=>{
    box.classList.remove("attempted");
    if(answers[i]!=null) box.classList.add("attempted");
  });
}

function updateTimer(){
  const m=Math.floor(seconds/60);
  const s=seconds%60;
  time.innerText=`${m}:${s<10?'0':''}${s}`;
  if(seconds<=0) submitQuiz();
  seconds--;
}

// ===================== SUBMIT =====================
function submitQuiz(){
  clearInterval(timer);
  let score=0;
  questions.forEach((q,i)=>{
    if(answers[i]===q.answer) score+=2;
  });

  // Save login with score
  db.collection("logins").add({
    name: username.value,
    phone: userPhone.value,
    score: score,
    time: new Date()
  });

  quizScreen.style.display="none";
  resultScreen.style.display="block";
  resultScreen.innerHTML=`
    <h2>${username.value}</h2>
    <h3>Score: ${score}</h3>
    <button onclick="showReview()">Review Answers 🔥</button>
    <button onclick="location.reload()">Restart</button>
    <div id="reviewBox"></div>
  `;
}

function showReview(){
  let html="";
  const reviewBox = document.getElementById("reviewBox");
  questions.forEach((q,i)=>{
    html+=`
      <div class='review-card'>
        <b>Q${i+1}: ${q.q}</b><br>
        <span class='${answers[i]===q.answer?'correct':'wrong'}'>
          Your Answer: ${answers[i]!=null?q.options[answers[i]]:'Not Attempted'}
        </span><br>
        <span class='correct'>Correct: ${q.options[q.answer]}</span>
      </div>
    `;
  });
  reviewBox.innerHTML=html;
}

// ===================== ADMIN PANEL =====================
function openAdmin(){
  const pass = prompt("Enter Admin Password");
  if(pass!=="admin") return alert("Wrong Password");

  nameScreen.style.display="none";
  quizScreen.style.display="none";
  resultScreen.style.display="block";

  resultScreen.innerHTML=`
    <h2>Admin Panel 😎🔥</h2>

    <h3>Add Question</h3>
    <input id='newQ' placeholder='Question'>
    <input id='opt1' placeholder='Option 1'>
    <input id='opt2' placeholder='Option 2'>
    <input id='opt3' placeholder='Option 3'>
    <input id='opt4' placeholder='Option 4'>
    <select id='sectionSel'>
      <option>Math</option>
      <option>GK</option>
      <option>GS</option>
      <option>Reasoning</option>
    </select>
    <select id='answerSel'>
      <option value='0'>Correct → Option 1</option>
      <option value='1'>Correct → Option 2</option>
      <option value='2'>Correct → Option 3</option>
      <option value='3'>Correct → Option 4</option>
    </select>
    <button onclick='addQuestion()'>Add Question</button>

    <h3>All Questions</h3>
    <div id='adminQuestions'>Loading...</div>

    <h3>Add Allowed User</h3>
    <input id='allowName' placeholder='Name'>
    <input id='allowPhone' placeholder='Phone'>
    <button onclick='addAllowedUser()'>Add User</button>

    <h3>Allowed Users</h3>
    <div id='allowedList'>Loading...</div>

    <h3>Login History</h3>
    <button onclick="resetLogins()">Reset Logins 💀</button>
    <div id='loginList'>Loading...</div>
  `;

  loadAdminQuestions();
  loadAllowedUsers();
  loadLogins();
}

// QUESTIONS FUNCTIONS
function addQuestion(){
  const q={
    section:document.getElementById("sectionSel").value,
    q:document.getElementById("newQ").value,
    options:[
      document.getElementById("opt1").value,
      document.getElementById("opt2").value,
      document.getElementById("opt3").value,
      document.getElementById("opt4").value
    ],
    answer:Number(document.getElementById("answerSel").value)
  };
  if(!q.q) return alert("Enter Question");
  db.collection("questions").add(q).then(()=>{
    alert("Question Added 😎");
    loadAdminQuestions();
    loadQuestions();
  });
}

function loadAdminQuestions(){
  db.collection("questions").get().then(snapshot=>{
    let html="";
    snapshot.forEach(doc=>{
      const q=doc.data();
      html+=`
        <div class='review-card'>
          <b>${q.section}</b><br>${q.q}<br>
          <button onclick="editQuestion('${doc.id}')">Edit</button>
          <button onclick="deleteQuestion('${doc.id}')">Delete</button>
        </div>
      `;
    });
    document.getElementById("adminQuestions").innerHTML = html;
  });
}

function deleteQuestion(id){
  if(!confirm("Delete Question?")) return;
  db.collection("questions").doc(id).delete().then(()=>{
    alert("Deleted 😎");
    loadAdminQuestions();
    loadQuestions();
  });
}

function editQuestion(id){
  db.collection("questions").doc(id).get().then(doc=>{
    const q=doc.data();
    resultScreen.innerHTML=`
      <h3>Edit Question 😎</h3>
      <input id='editQ' value="${q.q}">
      <input id='edit1' value="${q.options[0]}">
      <input id='edit2' value="${q.options[1]}">
      <input id='edit3' value="${q.options[2]}">
      <input id='edit4' value="${q.options[3]}">
      <button onclick="updateQuestion('${id}')">Update</button>
      <button onclick="openAdmin()">Back</button>
    `;
  });
}

function updateQuestion(id){
  const updated={
    q:document.getElementById("editQ").value,
    options:[
      document.getElementById("edit1").value,
      document.getElementById("edit2").value,
      document.getElementById("edit3").value,
      document.getElementById("edit4").value
    ]
  };
  db.collection("questions").doc(id).update(updated).then(()=>{
    alert("Updated 😎🔥");
    openAdmin();
    loadQuestions();
  });
}

// ALLOWED USERS FUNCTIONS
function addAllowedUser(){
  const name = document.getElementById("allowName").value;
  const phone = document.getElementById("allowPhone").value;
  if(!name || !phone) return alert("Enter both Name and Phone");
  db.collection("allowedUsers").add({name, phone}).then(()=>{
    alert("User Added 😎");
    loadAllowedUsers();
    document.getElementById("allowName").value="";
    document.getElementById("allowPhone").value="";
  });
}

function loadAllowedUsers(){
  db.collection("allowedUsers").get().then(snapshot=>{
    let html="";
    snapshot.forEach(doc=>{
      const u = doc.data();
      html+=`
        <div class='review-card'>
          👤 ${u.name} | 📞 ${u.phone}
          <button onclick="deleteAllowedUser('${doc.id}')">Delete</button>
        </div>
      `;
    });
    document.getElementById("allowedList").innerHTML = html || "No Allowed Users Yet 😢";
  });
}

function deleteAllowedUser(id){
  if(!confirm("Delete this allowed user?")) return;
  db.collection("allowedUsers").doc(id).delete().then(()=>{
    alert("Deleted 😎");
    loadAllowedUsers();
  });
}

// LOGINS FUNCTIONS
function loadLogins(){
  db.collection("logins").orderBy("time","desc").get().then(snapshot=>{
    let html="";
    snapshot.forEach(doc=>{
      const log = doc.data();
      const date = log.time.toDate().toLocaleString();
      html += `<div class='review-card'>👤 ${log.name} | 📞 ${log.phone} | Score: ${log.score} <br>⏱ ${date}</div>`;
    });
    document.getElementById("loginList").innerHTML = html || "No Logins Yet 😢";
  });
}

function resetLogins(){
  if(!confirm("Reset ALL Login History? 😈")) return;
  db.collection("logins").get().then(snapshot=>{
    snapshot.forEach(doc=>doc.ref.delete());
    loadLogins();
  });
}
</script>

</body>
</html>
